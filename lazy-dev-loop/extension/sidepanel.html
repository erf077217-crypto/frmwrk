<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lazy Developer Loop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 15px;
      color: #cba6f7;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    section { margin-bottom: 8px; flex-shrink: 0; }
    section h3 {
      font-size: 12px;
      color: #a6adc8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #cdd6f4;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #cba6f7; }
    textarea::selection { background: #cba6f7; color: #1e1e2e; }

    input[type="text"] {
      width: 100%;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      font-family: inherit;
      color: #cdd6f4;
      outline: none;
    }
    input[type="text"]:focus { border-color: #cba6f7; }

    button {
      flex: none;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .btn-row button { flex: 1; }

    button.primary   { background: #cba6f7; color: #1e1e2e; }
    button.primary:hover:not(:disabled) { background: #b4befe; }
    button.secondary { background: #45475a; color: #cdd6f4; }
    button.secondary:hover:not(:disabled) { background: #585b70; }
    button.accent    { background: #89b4fa; color: #1e1e2e; }
    button.accent:hover:not(:disabled) { background: #b4befe; }
    button.danger    { background: #f38ba8; color: #1e1e2e; }
    button.danger:hover:not(:disabled) { background: #eba0ac; }

    .scroll-area {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    #statusBar {
      flex-shrink: 0;
      font-size: 11px;
      padding: 4px 0;
      color: #6c7086;
      text-align: center;
      border-bottom: 1px solid #313244;
      margin-bottom: 8px;
    }
    .status-ok   { color: #a6e3a1; }
    .status-err  { color: #f38ba8; }
    .status-info { color: #89b4fa; }

    /* ── Session info row ── */
    #sessionInfo {
      font-size: 11px;
      color: #6c7086;
      margin-top: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #sessionInfo .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-active   { background: #a6e3a1; color: #1e1e2e; }
    .badge-inactive { background: #45475a; color: #a6adc8; }

    /* ── Saved sessions list ── */
    .session-list {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      max-height: 140px;
      overflow-y: auto;
    }
    .session-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      border-bottom: 1px solid #313244;
      font-size: 11px;
    }
    .session-list-item:last-child { border-bottom: none; }
    .sli-id    { color: #cdd6f4; font-family: monospace; font-size: 11px; }
    .sli-meta  { color: #6c7086; font-size: 10px; margin-top: 1px; }
    .sli-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .sli-actions button {
      flex: none; padding: 2px 7px; font-size: 9px; border-radius: 4px;
      background: #45475a; color: #cdd6f4; border: none; cursor: pointer;
    }
    .sli-actions button:hover { background: #585b70; }

    /* ── Workspace ── */
    .workspace-display {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .workspace-path { color: #cdd6f4; font-family: monospace; font-size: 11px; }
    .workspace-edit { margin-top: 6px; }

    /* ── Viewer ── */
    .viewer {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-family: Consolas, "Cascadia Code", "Fira Code", monospace;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      outline: none;
      resize: none;
      width: 100%;
    }
    .viewer:focus { border-color: #cba6f7; }
    .viewer::selection { background: #cba6f7; color: #1e1e2e; }
    .viewer::placeholder { color: #585b70; }

    #responseSection { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
    #responseSection .viewer { flex: 1; min-height: 60px; }

    /* ── Prompt ── */
    #promptSection textarea { min-height: 36px; max-height: 72px; }

    /* ── Diagnostics ── */
    details { flex-shrink: 0; margin-top: 4px; }
    details summary { cursor: pointer; color: #6c7086; font-size: 11px; }
    .debug-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .debug-row button {
      flex: 1; padding: 4px; font-size: 10px;
      background: #313244; color: #a6adc8;
    }
    #debugLog {
      margin-top: 4px;
      background: #11111b;
      border-radius: 4px;
      padding: 6px;
      font-size: 10px;
      font-family: monospace;
      line-height: 1.3;
      white-space: pre-wrap;
      max-height: 80px;
      overflow-y: auto;
      color: #6c7086;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>Lazy Developer Loop</h1>

<!-- Status bar -->
<div id="statusBar">Ready</div>

<!-- Scrollable content area -->
<div class="scroll-area">

  <!-- Workspace -->
  <section>
    <h3>Workspace</h3>
    <div class="workspace-display">
      <span class="workspace-path" id="workspacePath">(not set)</span>
      <button class="secondary" id="workspaceChangeBtn" style="padding:3px 8px;font-size:10px;">Change</button>
    </div>
    <div id="workspaceEditRow" class="hidden workspace-edit">
      <input type="text" id="workspaceInput" placeholder="/path/to/repo" />
      <div class="btn-row">
        <button class="secondary" id="workspaceSetBtn">Set</button>
        <button class="secondary" id="workspaceCancelBtn">Cancel</button>
      </div>
    </div>
  </section>

  <!-- Session Controls -->
  <section>
    <h3>Session</h3>
    <div class="btn-row">
      <button class="primary" id="newSessionBtn">+ New Session</button>
      <button class="danger" id="stopSessionBtn" disabled>Stop</button>
    </div>
    <div id="sessionInfo">
      <span class="badge badge-inactive" id="sessionStateBadge">Inactive</span>
      <span id="sessionIdDisplay">—</span>
      <span id="sessionUptimeDisplay"></span>
    </div>
  </section>

  <!-- Saved Sessions -->
  <section>
    <h3>Saved Sessions</h3>
    <div class="session-list" id="savedSessionList">
      <div style="color:#585b70;text-align:center;padding:10px;font-size:11px;">No saved sessions</div>
    </div>
  </section>

  <!-- Prompt -->
  <section id="promptSection">
    <h3>Prompt</h3>
    <textarea id="promptInput" placeholder="Type or paste a prompt here…" disabled></textarea>
    <div class="btn-row">
      <button class="primary" id="sendBtn" disabled>Send to OpenCode</button>
      <button class="secondary" id="modeToggleBtn">Summary</button>
    </div>
  </section>

  <!-- Response -->
  <section id="responseSection">
    <h3>Response</h3>
    <textarea class="viewer" id="responseViewer" placeholder="(start a session and run a prompt)" spellcheck="false" disabled></textarea>
    <div class="btn-row">
      <button class="secondary" id="insertBtn" disabled>Insert Into ChatGPT</button>
    </div>
  </section>

  <!-- Terminal -->
  <section>
    <button class="accent" id="openTerminalBtn" disabled style="width:100%;">Open Terminal</button>
  </section>

</div>

<!-- Diagnostics -->
<details>
  <summary>Diagnostics</summary>
  <div class="debug-row">
    <button id="pingBtn">Ping ChatGPT</button>
    <button id="tabInfoBtn">Tab Info</button>
    <button id="refreshBtn">Refresh</button>
  </div>
  <div id="debugLog" class="hidden"></div>
</details>

<script src="sidepanel.js"></script>
</body>
</html>
