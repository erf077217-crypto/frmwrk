<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lazy Developer Loop</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      width: 420px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #cba6f7;
    }
    #response {
      width: 100%;
      box-sizing: border-box;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      color: #cdd6f4;
      resize: vertical;
      min-height: 80px;
      max-height: 300px;
      outline: none;
    }
    #response::selection {
      background: #cba6f7;
      color: #1e1e2e;
    }
    .empty {
      color: #6c7086;
      font-style: italic;
    }
    button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 12px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #cba6f7;
      color: #1e1e2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: #b4befe;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }
    .status-success {
      color: #a6e3a1;
    }
    .status-error {
      color: #f38ba8;
    }
    .status-hint {
      color: #6c7086;
    }

    hr {
      border: none;
      border-top: 1px solid #45475a;
      margin: 16px 0;
    }

    .debug-section {
      margin-top: 4px;
    }
    .debug-section summary {
      cursor: pointer;
      color: #a6adc8;
      font-size: 12px;
      font-weight: 600;
    }
    .debug-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .debug-buttons button {
      flex: 1;
      margin-top: 0;
      padding: 6px;
      font-size: 11px;
      background: #45475a;
      color: #cdd6f4;
    }
    .debug-buttons button:hover {
      background: #585b70;
    }
    #debugLog {
      margin-top: 8px;
      background: #11111b;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      font-family: monospace;
      line-height: 1.4;
      white-space: pre-wrap;
      max-height: 150px;
      overflow-y: auto;
      color: #a6adc8;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Lazy Developer Loop</h2>
  <textarea id="response" class="empty" readonly>Waiting for response…</textarea>
  <button id="insertBtn" disabled>Insert Into ChatGPT</button>
  <div id="status" class="status-hint">Open a ChatGPT tab, then highlight text and use Send To OpenCode.</div>

  <hr />
  <details class="debug-section">
    <summary>Debug</summary>
    <div class="debug-buttons">
      <button id="pingBtn">Ping ChatGPT Tab</button>
      <button id="tabInfoBtn">Get Tab Info</button>
    </div>
    <div id="debugLog" class="hidden"></div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
