services:
  bridge:
    build:
      context: ./bridge
    ports:
      - "${BRIDGE_PORT:-7777}:7777"
    volumes:
      - "${WORKSPACE_DIR:-.}:/workspace"
    environment:
      - BRIDGE_PORT=${BRIDGE_PORT:-7777}
      - WORKSPACE_PATH=/workspace
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENCODE_COMMAND=${OPENCODE_COMMAND:-opencode}
      - RUN_TIMEOUT=${RUN_TIMEOUT:-120}
      - DEBUG_OUTPUT=${DEBUG_OUTPUT:-true}
      - TMUX_SESSION_NAME=${TMUX_SESSION_NAME:-lazy-dev-loop}
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
