services:
  bridge:
    build:
      context: ./bridge
    ports:
      - "${BRIDGE_PORT:-7777}:7777"
    volumes:
      # Workspace access: mount host root so any directory is reachable
      - "/:/host"
      # Persistence: OpenCode sessions, config, and cache
      - "opencode-data:/home/app/.local/share/opencode"
      - "opencode-config:/home/app/.config/opencode"
      - "opencode-cache:/home/app/.cache/opencode"
      # Persistence: workspace selection and other lazy-dev-loop data
      - "opencode-persistence:/home/app/.local/share/lazy-dev-loop"
    environment:
      - BRIDGE_PORT=${BRIDGE_PORT:-7777}
      - RUN_TIMEOUT=${RUN_TIMEOUT:-120}
      - DEBUG_OUTPUT=${DEBUG_OUTPUT:-true}
      - TMUX_SESSION_NAME=${TMUX_SESSION_NAME:-lazy-dev-loop}
    stdin_open: true
    tty: true

volumes:
  opencode-data:
  opencode-config:
  opencode-cache:
  opencode-persistence:
